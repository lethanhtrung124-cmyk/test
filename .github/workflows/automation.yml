name: Automation Runner

"on":
  repository_dispatch:
    types: [automation-run]

jobs:
  automation:
    runs-on: ubuntu-latest
    env:
      TEST_RUN_ID: ${{ github.event.client_payload.test_run_id || 'RUN-AUTOMATION' }}
      TEST_BASE_URL: ${{ github.event.client_payload.base_url || 'http://127.0.0.1:4173' }}
      TEST_USERNAME: ${{ github.event.client_payload.account_role || secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ github.event.client_payload.password || secrets.TEST_PASSWORD }}
      PROJECT_CODE: ${{ github.event.client_payload.project_code || 'KTKT' }}
      TARGET_TRANSACTION_CODES: ${{ github.event.client_payload.transaction_codes }}
      TEST_BROWSER: ${{ github.event.client_payload.browser || 'chromium' }}
      TEST_SUITE: ${{ github.event.client_payload.suite }}
      ENVIRONMENT_CODE: UAT
      APPLICATION_VERSION: v2.0.0
      RESULTS_INGEST_URL: ${{ secrets.RESULTS_INGEST_URL }}
      RESULTS_INGEST_TOKEN: ${{ secrets.RESULTS_INGEST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright automation
        run: |
          PROJECT_ARG="--project=${TEST_BROWSER}"
          if [ -n "${TEST_SUITE}" ]; then
            npx playwright test tests/target-app/specs $PROJECT_ARG --grep "${TEST_SUITE}"
          else
            npx playwright test tests/target-app/specs $PROJECT_ARG
          fi

      - run: npm run report:results
        if: always()

      - run: npm run publish:results
        if: always()

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-evidence-${{ env.TEST_RUN_ID }}
          path: |
            playwright-report
            test-results
